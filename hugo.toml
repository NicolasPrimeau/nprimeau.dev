baseURL = "https://nprimeau.dev"
languageCode = "fr-ca"
defaultContentLanguage = "fr"
title = "Nicolas Primeau"
theme = "PaperMod"
[pagination]
  pagerSize = 10

[params]
  author = "Nicolas Primeau"
  description = "Des notes sur ce que je construis."
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/NicolasPrimeau"

[[menus.main]]
  name = "Notes"
  url = "/"
  weight = 1

[[menus.main]]
  name = "À propos"
  url = "/about"
  weight = 2

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  style = "github"
  lineNos = false
