baseURL = "https://nprimeau.dev"
languageCode = "fr-ca"
defaultContentLanguage = "fr"
title = "Nicolas Primeau"
theme = "paper"
enableInlineShortcodes = true

[pagination]
  pagerSize = 10

[params]
  color = "gray"
  github = "NicolasPrimeau"
  name = "Nicolas Primeau"
  bio = "Des notes sur ce que je construis. Infrastructure de données et systèmes d'IA."

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  style = "github"
  lineNos = false

[menu]
  [[menu.main]]
    identifier = "notes"
    name = "Notes"
    url = "/"
    weight = 1
  [[menu.main]]
    identifier = "about"
    name = "À propos"
    url = "/about/"
    weight = 2

[taxonomies]
  category = "categories"
  tag = "tags"
